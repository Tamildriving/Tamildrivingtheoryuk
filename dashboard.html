<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tamildriving – Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #D32F2F;
      --orange: #FF6F00;
      --bg: #0D0D0D;
      --card: #1A1A1A;
      --border: #2A2A2A;
      --text: #F5F5F5;
      --muted: #888;
      --input-bg: #111;
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Loading screen */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      font-size: 18px; color: var(--muted);
    }

    #app { display: none; }

    /* NAV */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--red), var(--orange));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 18px; }
    .logo-text span { color: var(--red); }

    .nav-right { display: flex; align-items: center; gap: 16px; }

    .user-badge {
      display: flex; align-items: center; gap: 8px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 14px;
    }

    .logout-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: var(--red); color: #fff; }

    /* MAIN */
    main { padding: 40px 32px; max-width: 900px; margin: 0 auto; }

    h1 { font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .welcome-sub { color: var(--muted); font-size: 15px; margin-bottom: 36px; }

    /* PROFILE CARD */
    .profile-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 28px;
    }

    .profile-header {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 28px;
    }

    .avatar {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--red), var(--orange));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 700;
      font-family: 'Poppins', sans-serif;
      flex-shrink: 0;
    }

    .profile-info h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .profile-info p  { color: var(--muted); font-size: 14px; }

    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 600px) { .profile-grid { grid-template-columns: 1fr; } }

    .field label {
      font-size: 12px; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.5px; display: block; margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--red); }

    .save-btn {
      padding: 11px 24px;
      background: linear-gradient(135deg, var(--red), var(--orange));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .save-btn:hover { opacity: 0.9; }

    .message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .message.success { background: #1a2e1a; color: #66bb6a; border: 1px solid #2e4d2e; display: block; }
    .message.error   { background: #2e1a1a; color: #ef5350; border: 1px solid #4d2e2e; display: block; }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    @media (max-width: 600px) { .stats { grid-template-columns: 1fr 1fr; } }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-value {
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--red), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label { color: var(--muted); font-size: 13px; margin-top: 4px; }
  </style>
</head>
<body>

<div id="loading">Checking session...</div>

<div id="app">
  <nav>
    <div class="logo">
      <div class="logo-icon">🚗</div>
      <div class="logo-text">Tamil<span>driving</span></div>
    </div>
    <div class="nav-right">
      <div class="user-badge">👤 <span id="nav-email">Loading...</span></div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <main>
    <h1>Welcome back, <span id="greeting-name">there</span> 👋</h1>
    <p class="welcome-sub">Manage your profile and track your progress</p>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value">0</div>
        <div class="stat-label">Lessons Completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">0</div>
        <div class="stat-label">Hours Practised</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">—</div>
        <div class="stat-label">Test Date</div>
      </div>
    </div>

    <!-- PROFILE EDITOR -->
    <div class="profile-card">
      <div class="profile-header">
        <div class="avatar" id="avatar-initials">?</div>
        <div class="profile-info">
          <h2 id="profile-name">Your Profile</h2>
          <p id="profile-email">Loading...</p>
        </div>
      </div>

      <div id="profile-msg" class="message"></div>

      <div class="profile-grid">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="input-name" placeholder="Your full name" />
        </div>
        <div class="field">
          <label>Phone Number</label>
          <input type="tel" id="input-phone" placeholder="+44 7000 000000" />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="input-email" disabled />
        </div>
        <div class="field">
          <label>City</label>
          <input type="text" id="input-city" placeholder="e.g. London" />
        </div>
      </div>

      <button class="save-btn" onclick="saveProfile()">Save changes</button>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient('YOUR_PROJECT_URL', 'YOUR_ANON_KEY');

  let currentUser = null;

  // ── PROTECT PAGE ──────────────────────────────────────
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = 'login.html'; // not logged in → redirect
      return;
    }
    currentUser = session.user;
    await loadProfile();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  // ── LOAD PROFILE ──────────────────────────────────────
  async function loadProfile() {
    const email = currentUser.email;
    document.getElementById('nav-email').textContent = email;
    document.getElementById('profile-email').textContent = email;
    document.getElementById('input-email').value = email;

    const { data: profile } = await sb
      .from('profiles')
      .select('*')
      .eq('id', currentUser.id)
      .single();

    if (profile) {
      const name = profile.full_name || '';
      document.getElementById('input-name').value  = name;
      document.getElementById('input-phone').value = profile.phone || '';
      document.getElementById('input-city').value  = profile.city  || '';
      document.getElementById('profile-name').textContent = name || email;
      document.getElementById('greeting-name').textContent = name.split(' ')[0] || 'there';
      document.getElementById('avatar-initials').textContent =
        name ? name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) : '?';
    }
  }

  // ── SAVE PROFILE ──────────────────────────────────────
  async function saveProfile() {
    const full_name = document.getElementById('input-name').value.trim();
    const phone     = document.getElementById('input-phone').value.trim();
    const city      = document.getElementById('input-city').value.trim();

    const { error } = await sb.from('profiles').upsert({
      id: currentUser.id,
      email: currentUser.email,
      full_name, phone, city,
      updated_at: new Date().toISOString()
    });

    if (error) {
      showMsg('profile-msg', 'Error saving: ' + error.message, 'error');
    } else {
      showMsg('profile-msg', '✅ Profile saved successfully!', 'success');
      document.getElementById('profile-name').textContent = full_name || currentUser.email;
      document.getElementById('greeting-name').textContent = full_name.split(' ')[0] || 'there';
      document.getElementById('avatar-initials').textContent =
        full_name ? full_name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) : '?';
      setTimeout(() => document.getElementById('profile-msg').className = 'message', 3000);
    }
  }

  // ── LOGOUT ────────────────────────────────────────────
  async function logout() {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'message ' + type;
  }

  init();
</script>
</body>
</html>
