<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Tamil Driving Theory Test</title>
<style>
  :root {
    --bg:        #0d1b2a;
    --surface:   #131f30;
    --surface2:  #1a2c42;
    --accent:    #e07b2a;
    --accent-dk: #c0600f;
    --accent2:   #22a85a;
    --text:      #e8f0fa;
    --text2:     #8fa8cc;
    --text3:     #4a6080;
    --border:    #233a55;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg); color: var(--text); padding: 24px;
  }
  .card {
    width: 100%; max-width: 420px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 14px; padding: 32px;
  }
  h1 {
    font-family: 'DM Serif Display', serif; font-size: 1.6rem; margin: 0 0 6px;
  }
  .sub { color: var(--text2); font-size: .9rem; margin: 0 0 24px; }
  .field-group { margin-bottom: 16px; }
  .field-label { display: block; font-size: .85rem; color: var(--text2); margin-bottom: 6px; }
  .field-input {
    width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: .95rem; font-family: inherit;
  }
  .field-input:focus { outline: none; border-color: var(--accent); }
  .submit-btn {
    width: 100%; padding: 13px; border: none; border-radius: 8px;
    background: var(--accent); color: #fff; font-size: .95rem; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: background .2s;
  }
  .submit-btn:hover { background: var(--accent-dk); }
  .submit-btn:disabled { opacity: .6; cursor: default; }
  .message { margin-top: 14px; font-size: .85rem; text-align: center; }
  .message.error   { color: #f87171; }
  .message.success { color: #4ade80; }
  .back-link { display: block; margin-top: 18px; text-align: center; font-size: .85rem; color: var(--text2); text-decoration: none; }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>
  <div class="card">
    <h1>Reset your password</h1>
    <p class="sub">Choose a new password for your account.</p>

    <div id="formArea">
      <div class="field-group">
        <label class="field-label" for="newPassword">New password (min 8 characters)</label>
        <input class="field-input" type="password" id="newPassword" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div class="field-group">
        <label class="field-label" for="confirmPassword">Confirm new password</label>
        <input class="field-input" type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="submit-btn" id="submitBtn" onclick="doReset()">Reset Password</button>
    </div>

    <div class="message" id="msg"></div>
    <a class="back-link" href="index.html">← Back to home</a>
  </div>

<script>
  const API = 'https://YOUR-BACKEND-URL.example.com'; // TODO: same as CONFIG_API.API_BASE / API in index.html

  function getToken() {
    const params = new URLSearchParams(window.location.search);
    return params.get('token');
  }

  function setMsg(type, text) {
    const el = document.getElementById('msg');
    el.className = 'message ' + type;
    el.textContent = text;
  }

  async function doReset() {
    const token = getToken();
    const password = document.getElementById('newPassword').value;
    const confirm  = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('submitBtn');

    if (!token) {
      setMsg('error', 'This reset link is missing its token. Please request a new one.');
      return;
    }
    if (!password || password.length < 8) {
      setMsg('error', 'Password must be at least 8 characters.');
      return;
    }
    if (password !== confirm) {
      setMsg('error', 'Passwords do not match.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Resetting…';
    setMsg('', '');

    try {
      const res = await fetch(API + '/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        const msgs = {
          INVALID_OR_EXPIRED_TOKEN: 'This reset link is invalid or has expired. Please request a new one.',
          PASSWORD_TOO_SHORT: 'Password must be at least 8 characters.',
        };
        setMsg('error', msgs[data.error] || 'Could not reset password. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
        return;
      }

      setMsg('success', '✓ Password reset! You can now log in with your new password.');
      document.getElementById('formArea').style.display = 'none';
    } catch (err) {
      setMsg('error', 'Network error. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doReset();
  });
</script>
</body>
</html>
